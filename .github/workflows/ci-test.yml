# Taken from https://github.com/uclchem/UCLCHEM

name: Test suite

on:
  pull_request:
    branches:
      - main
      - develop

  workflow_run:
    workflows: ["Lint (Code Style & Format)"]
    types:
      - completed

concurrency:
  group: test-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install and test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v6

      - name: "Install package"
        run: pip install .

      - name: "Run tests"
        run: pytest -n auto tests/test_install.py -v
